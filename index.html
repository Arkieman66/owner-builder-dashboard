<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Builder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      // Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyAFrdhfXiR93c7F-8LRB0_87mVWnOlv0uc",
        authDomain: "house-build-dashboard-b36d6.firebaseapp.com",
        projectId: "house-build-dashboard-b36d6",
        storageBucket: "house-build-dashboard-b36d6.firebasestorage.app",
        messagingSenderId: "1048757020108",
        appId: "1:1048757020108:web:59cc1a8f85097b536d6969"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const STORAGE_KEY = "ownerBuilderDashboardData_v1";

      const CATEGORY_OPTIONS = [
        "Sitework",
        "Foundation",
        "Framing",
        "Roofing",
        "Exterior",
        "Windows / Doors",
        "Plumbing",
        "Electrical",
        "HVAC",
        "Insulation / Drywall",
        "Cabinets",
        "Countertops",
        "Flooring",
        "Paint",
        "Trim",
        "Appliances",
        "Lighting",
        "Plumbing Fixtures",
        "Hardware",
        "Porches / Decks",
        "Garage",
        "Landscaping",
        "Other",
      ];

      const emptyQuote = {
        category: CATEGORY_OPTIONS[0],
        contractor: "",
        phone: "",
        email: "",
        amount: "",
        scope: "",
        status: "Quoted",
        notes: "",
      };

      const emptySelection = {
        category: CATEGORY_OPTIONS[0],
        room: "",
        item: "",
        status: "Not started",
        notes: "",
        product: "",
        budget: "",
      };

      const emptyBudget = {
        name: CATEGORY_OPTIONS[0],
        budget: "",
        actual: "",
        committed: "",
      };

      const emptySchedule = {
        task: "",
        owner: "",
        due: "",
        status: "Pending",
      };

      const emptyDecision = {
        area: "",
        item: "",
        status: "Open",
        impact: "",
        note: "",
      };

      const defaultData = {
        projectName: "Custom Home Project",
        phase: "Planning",
        quotes: [],
        selections: [],
        budget: [],
        schedule: [],
        decisions: [],
      };

      function loadData() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultData;
          const parsed = JSON.parse(raw);
          return {
            ...defaultData,
            ...parsed,
            quotes: Array.isArray(parsed.quotes) ? parsed.quotes : [],
            selections: Array.isArray(parsed.selections) ? parsed.selections : [],
            budget: Array.isArray(parsed.budget) ? parsed.budget : [],
            schedule: Array.isArray(parsed.schedule) ? parsed.schedule : [],
            decisions: Array.isArray(parsed.decisions) ? parsed.decisions : [],
          };
        } catch (e) {
          return defaultData;
        }
      }

      function money(n) {
        const value = Number(n || 0);
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value);
      }

      function statusClass(status) {
        const map = {
          Selected: "bg-green-100 text-green-800 border-green-200",
          Quoted: "bg-blue-100 text-blue-800 border-blue-200",
          Reviewing: "bg-amber-100 text-amber-800 border-amber-200",
          "Need Revised Quote": "bg-red-100 text-red-800 border-red-200",
          "Need sample": "bg-purple-100 text-purple-800 border-purple-200",
          "Reviewing quotes": "bg-amber-100 text-amber-800 border-amber-200",
          Researching: "bg-slate-100 text-slate-800 border-slate-200",
          "Not started": "bg-slate-100 text-slate-800 border-slate-200",
          Ordered: "bg-indigo-100 text-indigo-800 border-indigo-200",
          Installed: "bg-green-100 text-green-800 border-green-200",
          Open: "bg-red-100 text-red-800 border-red-200",
          Constraint: "bg-orange-100 text-orange-800 border-orange-200",
          Scheduled: "bg-green-100 text-green-800 border-green-200",
          Pending: "bg-slate-100 text-slate-800 border-slate-200",
          "This week": "bg-blue-100 text-blue-800 border-blue-200",
          "Pending decision": "bg-amber-100 text-amber-800 border-amber-200",
          "Waiting on revision": "bg-red-100 text-red-800 border-red-200",
          Decided: "bg-green-100 text-green-800 border-green-200",
        };
        return map[status] || "bg-slate-100 text-slate-800 border-slate-200";
      }

      function Badge({ children, status = false }) {
        return (
          <span className={`inline-flex rounded-full border px-2.5 py-1 text-xs font-semibold ${status ? statusClass(children) : 'bg-white text-slate-700 border-slate-200'}`}>
            {children}
          </span>
        );
      }

      function Card({ children, className = "" }) {
        return <div className={`rounded-3xl bg-white shadow-sm border border-slate-200 ${className}`}>{children}</div>;
      }

      function SectionTitle({ title, subtitle }) {
        return (
          <div>
            <h2 className="text-lg font-semibold text-slate-900">{title}</h2>
            {subtitle && <p className="text-sm text-slate-500 mt-1">{subtitle}</p>}
          </div>
        );
      }

      function LabeledInput({ label, value, onChange, placeholder = "", type = "text" }) {
        return (
          <label className="block space-y-1">
            <div className="text-sm font-medium text-slate-700">{label}</div>
            <input
              type={type}
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400"
            />
          </label>
        );
      }

      function LabeledTextarea({ label, value, onChange, placeholder = "" }) {
        return (
          <label className="block space-y-1">
            <div className="text-sm font-medium text-slate-700">{label}</div>
            <textarea
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              className="min-h-[110px] w-full rounded-2xl border border-slate-200 p-4 outline-none focus:border-slate-400"
            />
          </label>
        );
      }

      function LabeledSelect({ label, value, onChange, options }) {
        return (
          <label className="block space-y-1">
            <div className="text-sm font-medium text-slate-700">{label}</div>
            <select
              value={value}
              onChange={onChange}
              className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400"
            >
              {options.map((option) => (
                <option key={option} value={option}>{option}</option>
              ))}
            </select>
          </label>
        );
      }

      function App() {
        const [tab, setTab] = useState("dashboard");
        const [search, setSearch] = useState("");
        const [data, setData] = useState(loadData);
        const [loading, setLoading] = useState(true);
        const [quoteForm, setQuoteForm] = useState(emptyQuote);
        const [selectionForm, setSelectionForm] = useState(emptySelection);
        const [budgetForm, setBudgetForm] = useState(emptyBudget);
        const [scheduleForm, setScheduleForm] = useState(emptySchedule);
        const [decisionForm, setDecisionForm] = useState(emptyDecision);
        const [saveMessage, setSaveMessage] = useState("Ready");

        // Save to Firebase
        useEffect(() => {
          if (loading) return;
          db.collection("projects").doc("main").set(data);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          setSaveMessage("Saved locally on this device");
          const timer = setTimeout(() => setSaveMessage("Ready"), 1500);
          return () => clearTimeout(timer);
        }, [data]);

        // Load from Firebase
        useEffect(() => {
          db.collection("projects").doc("main").onSnapshot((doc) => {
            if (doc.exists) {
              setData(doc.data());
            }
            setLoading(false);
          });
        }, []);

        const totals = useMemo(() => {
          const budget = data.budget.reduce((a, b) => a + Number(b.budget || 0), 0);
          const actual = data.budget.reduce((a, b) => a + Number(b.actual || 0), 0);
          const committed = data.budget.reduce((a, b) => a + Number(b.committed || 0), 0);
          const progressBase = budget > 0 ? ((actual + committed * 0.35) / budget) * 100 : 0;
          const progress = Math.round(Math.max(0, Math.min(100, progressBase)));
          return { budget, actual, committed, progress };
        }, [data.budget]);

        const filteredSelections = data.selections.filter((s) => {
          const q = search.toLowerCase();
          return !q || [s.category, s.room, s.item, s.notes, s.product, s.status].join(" ").toLowerCase().includes(q);
        });

        const tabs = ["dashboard", "quotes", "selections", "budget", "schedule", "decisions"];

        function removeItem(key, index) {
          setData((prev) => ({
            ...prev,
            [key]: prev[key].filter((_, i) => i !== index),
          }));
        }

        function updateItem(key, index, field, value) {
          setData((prev) => ({
            ...prev,
            [key]: prev[key].map((item, i) => (i === index ? { ...item, [field]: value } : item)),
          }));
        }

        function addQuote(e) {
          e.preventDefault();
          if (!quoteForm.contractor && !quoteForm.category) return;
          setData((prev) => ({ ...prev, quotes: [{ ...quoteForm }, ...prev.quotes] }));
          setQuoteForm(emptyQuote);
        }

        function addSelection(e) {
          e.preventDefault();
          if (!selectionForm.item && !selectionForm.room) return;
          setData((prev) => ({ ...prev, selections: [{ ...selectionForm }, ...prev.selections] }));
          setSelectionForm(emptySelection);
        }

        function addBudget(e) {
          e.preventDefault();
          if (!budgetForm.name) return;
          setData((prev) => ({ ...prev, budget: [{ ...budgetForm }, ...prev.budget] }));
          setBudgetForm(emptyBudget);
        }

        function addSchedule(e) {
          e.preventDefault();
          if (!scheduleForm.task) return;
          setData((prev) => ({ ...prev, schedule: [{ ...scheduleForm }, ...prev.schedule] }));
          setScheduleForm(emptySchedule);
        }

        function addDecision(e) {
          e.preventDefault();
          if (!decisionForm.item && !decisionForm.area) return;
          setData((prev) => ({ ...prev, decisions: [{ ...decisionForm }, ...prev.decisions] }));
          setDecisionForm(emptyDecision);
        }

        function clearAllData() {
          if (!window.confirm("Clear all saved dashboard data on this device?")) return;
          localStorage.removeItem(STORAGE_KEY);
          setData(defaultData);
          setQuoteForm(emptyQuote);
          setSelectionForm(emptySelection);
          setBudgetForm(emptyBudget);
          setScheduleForm(emptySchedule);
          setDecisionForm(emptyDecision);
          setSaveMessage("All local data cleared");
        }

        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8">
            <div className="mx-auto max-w-7xl space-y-6">
              <Card className="p-6">
                <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                  <div>
                    <div className="mb-2 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">
                      Owner-Builder Dashboard
                    </div>
                    <h1 className="text-3xl font-semibold tracking-tight text-slate-900">{data.projectName || "Custom Home Project"}</h1>
                    <p className="mt-2 max-w-3xl text-sm text-slate-600">
                      Quotes, selections, budget, schedule, and decisions in one place.
                    </p>
                  </div>
                  <div className="flex flex-col items-start gap-3 md:items-end">
                    <div className="text-sm text-slate-500">{saveMessage}</div>
                    <div className="flex gap-2">
                      <button onClick={clearAllData} className="rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Clear all saved data</button>
                    </div>
                  </div>
                </div>
              </Card>

              <Card className="p-6">
                <div className="mb-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  <LabeledInput label="Project name" value={data.projectName} onChange={(e) => setData((prev) => ({ ...prev, projectName: e.target.value }))} placeholder="Custom Home Project" />
                  <LabeledInput label="Current phase" value={data.phase} onChange={(e) => setData((prev) => ({ ...prev, phase: e.target.value }))} placeholder="Planning" />
                  <div className="rounded-2xl border border-slate-200 p-4">
                    <div className="text-xs text-slate-500">Total Budget</div>
                    <div className="mt-2 text-lg font-semibold">{money(totals.budget)}</div>
                  </div>
                  <div className="rounded-2xl border border-slate-200 p-4">
                    <div className="text-xs text-slate-500">Committed</div>
                    <div className="mt-2 text-lg font-semibold">{money(totals.committed)}</div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
                  <Card className="rounded-2xl p-4">
                    <div className="text-xs text-slate-500">Actual Spent</div>
                    <div className="mt-2 text-lg font-semibold">{money(totals.actual)}</div>
                  </Card>
                  <Card className="rounded-2xl p-4">
                    <div className="text-xs text-slate-500">Decisions Logged</div>
                    <div className="mt-2 text-lg font-semibold">{data.decisions.length}</div>
                  </Card>
                  <Card className="rounded-2xl p-4">
                    <div className="text-xs text-slate-500">Quotes Saved</div>
                    <div className="mt-2 text-lg font-semibold">{data.quotes.length}</div>
                  </Card>
                  <Card className="rounded-2xl p-4">
                    <div className="text-xs text-slate-500">Progress</div>
                    <div className="mt-2 text-lg font-semibold">{totals.progress}%</div>
                  </Card>
                </div>
              </Card>

              <Card className="p-6">
                <div className="mb-3 flex items-center justify-between gap-4">
                  <SectionTitle title="Overall project progress" subtitle={`Phase: ${data.phase || "Planning"}`} />
                  <Badge>{data.phase || "Planning"}</Badge>
                </div>
                <div className="h-3 w-full overflow-hidden rounded-full bg-slate-200">
                  <div className="h-full rounded-full bg-slate-800" style={{ width: `${totals.progress}%` }}></div>
                </div>
              </Card>

              <div className="rounded-3xl bg-white p-2 shadow-sm border border-slate-200">
                <div className="grid grid-cols-3 gap-2 md:grid-cols-6">
                  {tabs.map((t) => (
                    <button
                      key={t}
                      onClick={() => setTab(t)}
                      className={`rounded-2xl px-3 py-2 text-sm font-medium capitalize ${tab === t ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'}`}
                    >
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              {tab === "dashboard" && (
                <div className="grid gap-6 lg:grid-cols-3">
                  <Card className="lg:col-span-2 p-6">
                    <SectionTitle title="Coming up next" subtitle="Your saved schedule items" />
                    <div className="mt-4 space-y-3">
                      {data.schedule.length === 0 ? (
                        <div className="rounded-2xl border border-dashed border-slate-300 p-6 text-sm text-slate-500">No schedule items yet.</div>
                      ) : (
                        data.schedule.map((item, idx) => (
                          <div key={idx} className="flex items-center justify-between gap-4 rounded-2xl border border-slate-200 p-4">
                            <div>
                              <div className="font-medium text-slate-900">{item.task || "Untitled task"}</div>
                              <div className="text-sm text-slate-500">Owner: {item.owner || "—"} · Due {item.due || "—"}</div>
                            </div>
                            <Badge status>{item.status || "Pending"}</Badge>
                          </div>
                        ))
                      )}
                    </div>
                  </Card>

                  <Card className="p-6">
                    <SectionTitle title="Priority alerts" subtitle="Simple live counts" />
                    <div className="mt-4 space-y-3 text-sm">
                      <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-slate-700">Open decisions: <strong>{data.decisions.filter((d) => (d.status || "").toLowerCase() === "open").length}</strong></div>
                      <div className="rounded-2xl border border-blue-200 bg-blue-50 p-4 text-slate-700">Selections still not started: <strong>{data.selections.filter((s) => (s.status || "").toLowerCase() === "not started").length}</strong></div>
                      <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-slate-700">Quotes saved: <strong>{data.quotes.length}</strong></div>
                    </div>
                  </Card>
                </div>
              )}

              {tab === "quotes" && (
                <div className="space-y-4">
                  <Card className="p-6">
                    <SectionTitle title="Add quote" subtitle="Store multiple bids with contact info and notes" />
                    <form onSubmit={addQuote} className="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                      <LabeledSelect label="Category" value={quoteForm.category} onChange={(e) => setQuoteForm({ ...quoteForm, category: e.target.value })} options={CATEGORY_OPTIONS} />
                      <LabeledInput label="Contractor" value={quoteForm.contractor} onChange={(e) => setQuoteForm({ ...quoteForm, contractor: e.target.value })} placeholder="Company or person" />
                      <LabeledInput label="Phone" value={quoteForm.phone} onChange={(e) => setQuoteForm({ ...quoteForm, phone: e.target.value })} placeholder="(501) ..." />
                      <LabeledInput label="Email" value={quoteForm.email} onChange={(e) => setQuoteForm({ ...quoteForm, email: e.target.value })} placeholder="name@email.com" />
                      <LabeledInput label="Amount" type="number" value={quoteForm.amount} onChange={(e) => setQuoteForm({ ...quoteForm, amount: e.target.value })} placeholder="18500" />
                      <label className="block space-y-1">
                        <div className="text-sm font-medium text-slate-700">Status</div>
                        <select value={quoteForm.status} onChange={(e) => setQuoteForm({ ...quoteForm, status: e.target.value })} className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400">
                          <option>Quoted</option>
                          <option>Reviewing</option>
                          <option>Selected</option>
                          <option>Need Revised Quote</option>
                        </select>
                      </label>
                      <div className="md:col-span-2 xl:col-span-2">
                        <LabeledInput label="Scope" value={quoteForm.scope} onChange={(e) => setQuoteForm({ ...quoteForm, scope: e.target.value })} placeholder="What is included or excluded" />
                      </div>
                      <div className="md:col-span-2 xl:col-span-4">
                        <LabeledTextarea label="Personal notes" value={quoteForm.notes} onChange={(e) => setQuoteForm({ ...quoteForm, notes: e.target.value })} placeholder="Warranty, lead time, quality concerns, reason selected..." />
                      </div>
                      <div>
                        <button type="submit" className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save quote</button>
                      </div>
                    </form>
                  </Card>

                  <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                    {data.quotes.length === 0 ? (
                      <Card className="p-6 md:col-span-2 xl:col-span-3"><div className="text-sm text-slate-500">No quotes saved yet.</div></Card>
                    ) : data.quotes.map((q, idx) => (
                      <Card key={idx} className="p-6">
                        <div className="flex items-center justify-between gap-3">
                          <Badge>{q.category || "Uncategorized"}</Badge>
                          <Badge status>{q.status || "Quoted"}</Badge>
                        </div>
                        <div className="mt-4">
                          <div className="text-xl font-semibold text-slate-900">{q.contractor || "Unnamed contractor"}</div>
                          <div className="mt-2 text-2xl font-semibold">{money(q.amount)}</div>
                        </div>
                        <div className="mt-4 text-sm text-slate-600">{q.scope || "No scope entered."}</div>
                        <div className="mt-4 rounded-2xl bg-slate-50 p-3 text-sm text-slate-700 space-y-2">
                          <div>{q.phone || "No phone"}</div>
                          <div>{q.email || "No email"}</div>
                        </div>
                        <div className="mt-4 rounded-2xl border border-slate-200 p-3 text-sm text-slate-700">
                          <div className="mb-1 font-medium text-slate-900">Personal notes</div>
                          <div>{q.notes || "No notes"}</div>
                        </div>
                        <button onClick={() => removeItem('quotes', idx)} className="mt-4 rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Delete</button>
                      </Card>
                    ))}
                  </div>
                </div>
              )}

              {tab === "selections" && (
                <div className="space-y-4">
                  <Card className="p-6">
                    <SectionTitle title="Add selection" subtitle="Track decisions like flooring, paint, pulls, fixtures, and finishes" />
                    <form onSubmit={addSelection} className="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                      <LabeledSelect label="Category" value={selectionForm.category} onChange={(e) => setSelectionForm({ ...selectionForm, category: e.target.value })} options={CATEGORY_OPTIONS} />
                      <LabeledInput label="Room / area" value={selectionForm.room} onChange={(e) => setSelectionForm({ ...selectionForm, room: e.target.value })} placeholder="Kitchen" />
                      <LabeledInput label="Item" value={selectionForm.item} onChange={(e) => setSelectionForm({ ...selectionForm, item: e.target.value })} placeholder="Cabinet pulls" />
                      <LabeledInput label="Product" value={selectionForm.product} onChange={(e) => setSelectionForm({ ...selectionForm, product: e.target.value })} placeholder="Brand / SKU / finish" />
                      <LabeledInput label="Budget / allowance" value={selectionForm.budget} onChange={(e) => setSelectionForm({ ...selectionForm, budget: e.target.value })} placeholder="$450 allowance" />
                      <label className="block space-y-1">
                        <div className="text-sm font-medium text-slate-700">Status</div>
                        <select value={selectionForm.status} onChange={(e) => setSelectionForm({ ...selectionForm, status: e.target.value })} className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400">
                          <option>Not started</option>
                          <option>Researching</option>
                          <option>Reviewing quotes</option>
                          <option>Need sample</option>
                          <option>Selected</option>
                          <option>Ordered</option>
                          <option>Installed</option>
                        </select>
                      </label>
                      <div className="md:col-span-2 xl:col-span-3">
                        <LabeledTextarea label="Notes" value={selectionForm.notes} onChange={(e) => setSelectionForm({ ...selectionForm, notes: e.target.value })} placeholder="Preferences, comparison notes, concerns, spouse input..." />
                      </div>
                      <div>
                        <button type="submit" className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save selection</button>
                      </div>
                    </form>
                  </Card>

                  <Card className="p-4">
                    <input
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      placeholder="Search room, item, note, or product..."
                      className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400"
                    />
                  </Card>
                  <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                    {filteredSelections.length === 0 ? (
                      <Card className="p-6 md:col-span-2 xl:col-span-3"><div className="text-sm text-slate-500">No selections saved yet.</div></Card>
                    ) : filteredSelections.map((s, idx) => (
                      <Card key={idx} className="p-6">
                        <div className="flex items-center justify-between gap-3">
                          <Badge>{s.room || "Unassigned"}</Badge>
                          <Badge status>{s.status || "Not started"}</Badge>
                        </div>
                        <div className="mt-4 flex items-center justify-between gap-3">
                          <div className="text-xl font-semibold text-slate-900">{s.item || "Unnamed selection"}</div>
                          <Badge>{s.category || "Other"}</Badge>
                        </div>
                        <div className="mt-4 space-y-2 text-sm text-slate-600">
                          <div><span className="font-medium text-slate-900">Category:</span> {s.category || "—"}</div>
                          <div><span className="font-medium text-slate-900">Product:</span> {s.product || "—"}</div>
                          <div><span className="font-medium text-slate-900">Budget:</span> {s.budget || "—"}</div>
                        </div>
                        <div className="mt-4 rounded-2xl border border-slate-200 p-3 text-sm text-slate-700">
                          <div className="mb-1 font-medium text-slate-900">Selection notes</div>
                          <div>{s.notes || "No notes"}</div>
                        </div>
                        <button onClick={() => removeItem('selections', idx)} className="mt-4 rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Delete</button>
                      </Card>
                    ))}
                  </div>
                </div>
              )}

              {tab === "budget" && (
                <div className="space-y-4">
                  <Card className="p-6">
                    <SectionTitle title="Add budget line" subtitle="Track budget, committed amount, and actual amount" />
                    <form onSubmit={addBudget} className="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                      <LabeledSelect label="Category" value={budgetForm.name} onChange={(e) => setBudgetForm({ ...budgetForm, name: e.target.value })} options={CATEGORY_OPTIONS} />
                      <LabeledInput label="Budget" type="number" value={budgetForm.budget} onChange={(e) => setBudgetForm({ ...budgetForm, budget: e.target.value })} placeholder="34000" />
                      <LabeledInput label="Actual" type="number" value={budgetForm.actual} onChange={(e) => setBudgetForm({ ...budgetForm, actual: e.target.value })} placeholder="0" />
                      <LabeledInput label="Committed" type="number" value={budgetForm.committed} onChange={(e) => setBudgetForm({ ...budgetForm, committed: e.target.value })} placeholder="31500" />
                      <div>
                        <button type="submit" className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save budget line</button>
                      </div>
                    </form>
                  </Card>

                  <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                    {data.budget.length === 0 ? (
                      <Card className="p-6 md:col-span-2 xl:col-span-4"><div className="text-sm text-slate-500">No budget lines saved yet.</div></Card>
                    ) : data.budget.map((b, idx) => {
                      const pct = Number(b.budget || 0) > 0 ? Math.min(100, Math.round(((Number(b.actual || 0) + Number(b.committed || 0)) / Number(b.budget || 0)) * 100)) : 0;
                      return (
                        <Card key={idx} className="p-6">
                          <div className="space-y-4">
                            <LabeledSelect
                              label="Category"
                              value={b.name || CATEGORY_OPTIONS[0]}
                              onChange={(e) => updateItem('budget', idx, 'name', e.target.value)}
                              options={CATEGORY_OPTIONS}
                            />
                            <div className="grid gap-3 md:grid-cols-3">
                              <LabeledInput
                                label="Budget"
                                type="number"
                                value={b.budget || ''}
                                onChange={(e) => updateItem('budget', idx, 'budget', e.target.value)}
                                placeholder="0"
                              />
                              <LabeledInput
                                label="Actual"
                                type="number"
                                value={b.actual || ''}
                                onChange={(e) => updateItem('budget', idx, 'actual', e.target.value)}
                                placeholder="0"
                              />
                              <LabeledInput
                                label="Committed"
                                type="number"
                                value={b.committed || ''}
                                onChange={(e) => updateItem('budget', idx, 'committed', e.target.value)}
                                placeholder="0"
                              />
                            </div>
                            <div className="rounded-2xl bg-slate-50 p-3 text-sm text-slate-700 space-y-1">
                              <div className="flex justify-between"><span>Budget</span><span className="font-medium text-slate-900">{money(b.budget)}</span></div>
                              <div className="flex justify-between"><span>Actual</span><span className="font-medium text-slate-900">{money(b.actual)}</span></div>
                              <div className="flex justify-between"><span>Committed</span><span className="font-medium text-slate-900">{money(b.committed)}</span></div>
                            </div>
                            <div className="h-2 overflow-hidden rounded-full bg-slate-200">
                              <div className="h-full rounded-full bg-slate-800" style={{ width: `${pct}%` }}></div>
                            </div>
                            <button onClick={() => removeItem('budget', idx)} className="rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Delete</button>
                          </div>
                        </Card>
                      );
                    })}
                  </div>
                </div>
              )}

              {tab === "schedule" && (
                <div className="space-y-4">
                  <Card className="p-6">
                    <SectionTitle title="Add schedule item" subtitle="Track near-term tasks, owners, and due dates" />
                    <form onSubmit={addSchedule} className="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                      <LabeledInput label="Task" value={scheduleForm.task} onChange={(e) => setScheduleForm({ ...scheduleForm, task: e.target.value })} placeholder="Finalize foundation bid" />
                      <LabeledInput label="Owner" value={scheduleForm.owner} onChange={(e) => setScheduleForm({ ...scheduleForm, owner: e.target.value })} placeholder="You / contractor" />
                      <LabeledInput label="Due" value={scheduleForm.due} onChange={(e) => setScheduleForm({ ...scheduleForm, due: e.target.value })} placeholder="Apr 14" />
                      <label className="block space-y-1">
                        <div className="text-sm font-medium text-slate-700">Status</div>
                        <select value={scheduleForm.status} onChange={(e) => setScheduleForm({ ...scheduleForm, status: e.target.value })} className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400">
                          <option>Pending</option>
                          <option>This week</option>
                          <option>Pending decision</option>
                          <option>Scheduled</option>
                          <option>Waiting on revision</option>
                        </select>
                      </label>
                      <div>
                        <button type="submit" className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save schedule item</button>
                      </div>
                    </form>
                  </Card>

                  <Card className="p-6">
                    <SectionTitle title="Near-term schedule" />
                    <div className="mt-4 space-y-3">
                      {data.schedule.length === 0 ? (
                        <div className="rounded-2xl border border-dashed border-slate-300 p-6 text-sm text-slate-500">No schedule items saved yet.</div>
                      ) : data.schedule.map((item, idx) => (
                        <div key={idx} className="grid gap-3 rounded-2xl border border-slate-200 p-4 md:grid-cols-[2fr_1fr_140px_100px] md:items-center">
                          <div>
                            <div className="font-medium text-slate-900">{item.task || "Untitled task"}</div>
                            <div className="text-sm text-slate-500">{item.owner || "—"}</div>
                          </div>
                          <div className="text-sm text-slate-600">Due {item.due || "—"}</div>
                          <div><Badge status>{item.status || "Pending"}</Badge></div>
                          <button onClick={() => removeItem('schedule', idx)} className="rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Delete</button>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>
              )}

              {tab === "decisions" && (
                <div className="grid gap-4 md:grid-cols-2">
                  <Card className="p-6">
                    <SectionTitle title="Add decision" subtitle="Track open issues, constraints, and resolved choices" />
                    <form onSubmit={addDecision} className="mt-4 space-y-4">
                      <LabeledInput label="Area" value={decisionForm.area} onChange={(e) => setDecisionForm({ ...decisionForm, area: e.target.value })} placeholder="Kitchen / Great room / Porch" />
                      <LabeledInput label="Decision item" value={decisionForm.item} onChange={(e) => setDecisionForm({ ...decisionForm, item: e.target.value })} placeholder="Vault height" />
                      <label className="block space-y-1">
                        <div className="text-sm font-medium text-slate-700">Status</div>
                        <select value={decisionForm.status} onChange={(e) => setDecisionForm({ ...decisionForm, status: e.target.value })} className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400">
                          <option>Open</option>
                          <option>Reviewing</option>
                          <option>Constraint</option>
                          <option>Decided</option>
                        </select>
                      </label>
                      <LabeledInput label="Impact" value={decisionForm.impact} onChange={(e) => setDecisionForm({ ...decisionForm, impact: e.target.value })} placeholder="Cost / appearance / structure / schedule" />
                      <LabeledTextarea label="Note" value={decisionForm.note} onChange={(e) => setDecisionForm({ ...decisionForm, note: e.target.value })} placeholder="Write your note, concern, or final decision here..." />
                      <div>
                        <button type="submit" className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save decision</button>
                      </div>
                    </form>
                  </Card>

                  <Card className="p-6">
                    <SectionTitle title="Saved decisions" />
                    <div className="mt-4 space-y-3">
                      {data.decisions.length === 0 ? (
                        <div className="rounded-2xl border border-dashed border-slate-300 p-6 text-sm text-slate-500">No decisions saved yet.</div>
                      ) : data.decisions.map((d, idx) => (
                        <div key={idx} className="rounded-2xl border border-slate-200 p-4">
                          <div className="mb-2 flex items-center justify-between gap-4">
                            <div>
                              <div className="font-medium text-slate-900">{d.item || "Untitled decision"}</div>
                              <div className="text-sm text-slate-500">{d.area || "—"}</div>
                            </div>
                            <Badge status>{d.status || "Open"}</Badge>
                          </div>
                          <div className="text-sm text-slate-600"><span className="font-medium text-slate-900">Impact:</span> {d.impact || "—"}</div>
                          <div className="mt-2 text-sm text-slate-600">{d.note || "No note"}</div>
                          <button onClick={() => removeItem('decisions', idx)} className="mt-4 rounded-2xl bg-red-50 px-4 py-2 text-sm font-medium text-red-700 border border-red-200">Delete</button>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
