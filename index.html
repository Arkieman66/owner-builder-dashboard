<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Builder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const quoteData = [
        {
          category: "Flooring",
          contractor: "Arkansas Floor Co.",
          phone: "(501) 555-0142",
          email: "sales@arfloorco.com",
          amount: 18500,
          scope: "LVP in main areas, tile in baths, install included",
          status: "Quoted",
          notes: "Best warranty. Slightly longer lead time.",
        },
        {
          category: "Flooring",
          contractor: "Delta Interiors",
          phone: "(501) 555-0191",
          email: "bids@deltainteriors.com",
          amount: 16200,
          scope: "Lower-grade LVP, excludes stair nosing and trim transitions",
          status: "Reviewing",
          notes: "Cheaper, but material feels lighter.",
        },
        {
          category: "Cabinets",
          contractor: "Heritage Millwork",
          phone: "(501) 555-0108",
          email: "design@heritagemillwork.com",
          amount: 27400,
          scope: "Kitchen, pantry, master bath, utility room uppers",
          status: "Selected",
          notes: "Selected for better drawer hardware and cleaner island layout.",
        },
        {
          category: "Paint",
          contractor: "River Valley Paint",
          phone: "(501) 555-0167",
          email: "office@rvpaint.com",
          amount: 9300,
          scope: "Interior walls, trim, ceilings, 2 coats + primer",
          status: "Need Revised Quote",
          notes: "Need alternate price for smooth drywall finish in great room.",
        },
      ];

      const selectionData = [
        {
          room: "Kitchen",
          item: "Cabinet pulls",
          status: "Researching",
          notes: "Prefer warm brass or aged bronze. Avoid shiny chrome.",
          product: "TBD",
          budget: "$450 allowance",
        },
        {
          room: "Kitchen",
          item: "Countertops",
          status: "Selected",
          notes: "Quartz, light tone, low movement pattern.",
          product: "Calacatta-look quartz",
          budget: "$7,200",
        },
        {
          room: "Great Room",
          item: "Paint color",
          status: "Need sample",
          notes: "Warm white. Need to test against flooring and trim.",
          product: "TBD",
          budget: "$0",
        },
        {
          room: "Master Bath",
          item: "Shower tile",
          status: "Selected",
          notes: "Large-format tile for fewer grout lines.",
          product: "12x24 porcelain",
          budget: "$2,100",
        },
        {
          room: "Whole House",
          item: "Floor covering",
          status: "Reviewing quotes",
          notes: "Need durability, easy cleaning, medium-warm tone.",
          product: "LVP vs engineered wood",
          budget: "$18,000 target",
        },
      ];

      const budgetData = [
        { name: "Sitework", budget: 18000, actual: 12000, committed: 16000 },
        { name: "Foundation", budget: 34000, actual: 0, committed: 31500 },
        { name: "Framing", budget: 52000, actual: 0, committed: 49800 },
        { name: "Windows / Doors", budget: 28000, actual: 0, committed: 24100 },
        { name: "Cabinets", budget: 30000, actual: 0, committed: 27400 },
        { name: "Flooring", budget: 18000, actual: 0, committed: 18500 },
        { name: "Paint", budget: 10000, actual: 0, committed: 9300 },
        { name: "Porches", budget: 22000, actual: 0, committed: 0 },
      ];

      const scheduleData = [
        { task: "Finalize foundation bid", owner: "You", due: "Apr 10", status: "This week" },
        { task: "Choose flooring direction", owner: "You / spouse", due: "Apr 14", status: "Pending decision" },
        { task: "Cabinet shop field measure", owner: "Heritage Millwork", due: "May 2", status: "Scheduled" },
        { task: "Window package review", owner: "Supplier", due: "May 4", status: "Waiting on revision" },
      ];

      const decisionLog = [
        { area: "Rear slider", item: "Center bar", status: "Open", impact: "Affects look + function", note: "May change to picture window if center bar is non-functional." },
        { area: "Great room", item: "Vault height", status: "Open", impact: "Structure + finish cost", note: "To be determined during construction depending on roof pitch." },
        { area: "Front porch", item: "Shelf / cabinet space", status: "Constraint", impact: "Storage layout", note: "Current layout may not have enough room to add shelf or cabinet." },
        { area: "Bedroom wing", item: "Symmetry adjustment", status: "Reviewing", impact: "Exterior appearance", note: "Bedroom to match opposite side proportions more closely." },
      ];

      function money(n) {
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);
      }

      function statusClass(status) {
        const map = {
          Selected: "bg-green-100 text-green-800 border-green-200",
          Quoted: "bg-blue-100 text-blue-800 border-blue-200",
          Reviewing: "bg-amber-100 text-amber-800 border-amber-200",
          "Need Revised Quote": "bg-red-100 text-red-800 border-red-200",
          "Need sample": "bg-purple-100 text-purple-800 border-purple-200",
          "Reviewing quotes": "bg-amber-100 text-amber-800 border-amber-200",
          Researching: "bg-slate-100 text-slate-800 border-slate-200",
          Open: "bg-red-100 text-red-800 border-red-200",
          Constraint: "bg-orange-100 text-orange-800 border-orange-200",
          Scheduled: "bg-green-100 text-green-800 border-green-200",
          "This week": "bg-blue-100 text-blue-800 border-blue-200",
          "Pending decision": "bg-amber-100 text-amber-800 border-amber-200",
          "Waiting on revision": "bg-red-100 text-red-800 border-red-200",
        };
        return map[status] || "bg-slate-100 text-slate-800 border-slate-200";
      }

      function Badge({ children, status = false }) {
        return (
          <span className={`inline-flex rounded-full border px-2.5 py-1 text-xs font-semibold ${status ? statusClass(children) : 'bg-white text-slate-700 border-slate-200'}`}>
            {children}
          </span>
        );
      }

      function Card({ children, className = "" }) {
        return <div className={`rounded-3xl bg-white shadow-sm border border-slate-200 ${className}`}>{children}</div>;
      }

      function SectionTitle({ title, subtitle }) {
        return (
          <div>
            <h2 className="text-lg font-semibold text-slate-900">{title}</h2>
            {subtitle && <p className="text-sm text-slate-500 mt-1">{subtitle}</p>}
          </div>
        );
      }

      function App() {
        const [tab, setTab] = useState("dashboard");
        const [search, setSearch] = useState("");

        const totals = useMemo(() => {
          const budget = budgetData.reduce((a, b) => a + b.budget, 0);
          const actual = budgetData.reduce((a, b) => a + b.actual, 0);
          const committed = budgetData.reduce((a, b) => a + b.committed, 0);
          const progress = Math.round(((actual + committed * 0.35) / budget) * 100);
          return { budget, actual, committed, progress };
        }, []);

        const filteredSelections = selectionData.filter((s) => {
          const q = search.toLowerCase();
          return !q || s.room.toLowerCase().includes(q) || s.item.toLowerCase().includes(q) || s.notes.toLowerCase().includes(q);
        });

        const tabs = ["dashboard", "quotes", "selections", "budget", "schedule", "decisions"];

        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8">
            <div className="mx-auto max-w-7xl space-y-6">
              <Card className="p-6">
                <div className="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                  <div>
                    <div className="mb-2 inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700">
                      Owner-Builder Dashboard
                    </div>
                    <h1 className="text-3xl font-semibold tracking-tight text-slate-900">Custom Home Project</h1>
                    <p className="mt-2 max-w-3xl text-sm text-slate-600">
                      Budget, quotes, contractor contacts, selections, and design decisions in one place.
                    </p>
                  </div>
                  <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
                    <Card className="rounded-2xl p-4">
                      <div className="text-xs text-slate-500">Total Budget</div>
                      <div className="mt-2 text-lg font-semibold">{money(totals.budget)}</div>
                    </Card>
                    <Card className="rounded-2xl p-4">
                      <div className="text-xs text-slate-500">Committed</div>
                      <div className="mt-2 text-lg font-semibold">{money(totals.committed)}</div>
                    </Card>
                    <Card className="rounded-2xl p-4">
                      <div className="text-xs text-slate-500">Decisions Made</div>
                      <div className="mt-2 text-lg font-semibold">12</div>
                    </Card>
                    <Card className="rounded-2xl p-4">
                      <div className="text-xs text-slate-500">Progress</div>
                      <div className="mt-2 text-lg font-semibold">{totals.progress}%</div>
                    </Card>
                  </div>
                </div>
              </Card>

              <Card className="p-6">
                <div className="mb-3 flex items-center justify-between gap-4">
                  <SectionTitle title="Overall project progress" subtitle="Budget activity and early commitments" />
                  <Badge>Planning + bidding phase</Badge>
                </div>
                <div className="h-3 w-full overflow-hidden rounded-full bg-slate-200">
                  <div className="h-full rounded-full bg-slate-800" style={{ width: `${Math.max(0, Math.min(100, totals.progress))}%` }}></div>
                </div>
              </Card>

              <div className="rounded-3xl bg-white p-2 shadow-sm border border-slate-200">
                <div className="grid grid-cols-3 gap-2 md:grid-cols-6">
                  {tabs.map((t) => (
                    <button
                      key={t}
                      onClick={() => setTab(t)}
                      className={`rounded-2xl px-3 py-2 text-sm font-medium capitalize ${tab === t ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700'}`}
                    >
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              {tab === "dashboard" && (
                <div className="grid gap-6 lg:grid-cols-3">
                  <Card className="lg:col-span-2 p-6">
                    <SectionTitle title="Coming up next" />
                    <div className="mt-4 space-y-3">
                      {scheduleData.map((item) => (
                        <div key={item.task} className="flex items-center justify-between gap-4 rounded-2xl border border-slate-200 p-4">
                          <div>
                            <div className="font-medium text-slate-900">{item.task}</div>
                            <div className="text-sm text-slate-500">Owner: {item.owner} · Due {item.due}</div>
                          </div>
                          <Badge status>{item.status}</Badge>
                        </div>
                      ))}
                    </div>
                  </Card>

                  <Card className="p-6">
                    <SectionTitle title="Priority alerts" />
                    <div className="mt-4 space-y-3 text-sm">
                      <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-slate-700">Flooring direction still open. It needs to be settled before trim and paint coordination.</div>
                      <div className="rounded-2xl border border-red-200 bg-red-50 p-4 text-slate-700">Paint bid needs revision for great room finish level before approval.</div>
                      <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-slate-700">Rear slider decision should be logged before window package is finalized.</div>
                    </div>
                  </Card>
                </div>
              )}

              {tab === "quotes" && (
                <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                  {quoteData.map((q, idx) => (
                    <Card key={idx} className="p-6">
                      <div className="flex items-center justify-between gap-3">
                        <Badge>{q.category}</Badge>
                        <Badge status>{q.status}</Badge>
                      </div>
                      <div className="mt-4">
                        <div className="text-xl font-semibold text-slate-900">{q.contractor}</div>
                        <div className="mt-2 text-2xl font-semibold">{money(q.amount)}</div>
                      </div>
                      <div className="mt-4 text-sm text-slate-600">{q.scope}</div>
                      <div className="mt-4 rounded-2xl bg-slate-50 p-3 text-sm text-slate-700 space-y-2">
                        <div>{q.phone}</div>
                        <div>{q.email}</div>
                      </div>
                      <div className="mt-4 rounded-2xl border border-slate-200 p-3 text-sm text-slate-700">
                        <div className="mb-1 font-medium text-slate-900">Personal notes</div>
                        <div>{q.notes}</div>
                      </div>
                    </Card>
                  ))}
                </div>
              )}

              {tab === "selections" && (
                <div className="space-y-4">
                  <Card className="p-4">
                    <input
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      placeholder="Search room, item, or note..."
                      className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400"
                    />
                  </Card>
                  <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                    {filteredSelections.map((s, idx) => (
                      <Card key={idx} className="p-6">
                        <div className="flex items-center justify-between gap-3">
                          <Badge>{s.room}</Badge>
                          <Badge status>{s.status}</Badge>
                        </div>
                        <div className="mt-4 text-xl font-semibold text-slate-900">{s.item}</div>
                        <div className="mt-4 space-y-2 text-sm text-slate-600">
                          <div><span className="font-medium text-slate-900">Product:</span> {s.product}</div>
                          <div><span className="font-medium text-slate-900">Budget:</span> {s.budget}</div>
                        </div>
                        <div className="mt-4 rounded-2xl border border-slate-200 p-3 text-sm text-slate-700">
                          <div className="mb-1 font-medium text-slate-900">Selection notes</div>
                          <div>{s.notes}</div>
                        </div>
                        <textarea className="mt-4 min-h-[100px] w-full rounded-2xl border border-slate-200 p-3 outline-none focus:border-slate-400" defaultValue={s.notes}></textarea>
                      </Card>
                    ))}
                  </div>
                </div>
              )}

              {tab === "budget" && (
                <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                  {budgetData.map((b) => {
                    const pct = Math.min(100, Math.round(((b.actual + b.committed) / b.budget) * 100));
                    return (
                      <Card key={b.name} className="p-6">
                        <div className="text-base font-semibold text-slate-900">{b.name}</div>
                        <div className="mt-4 space-y-2 text-sm text-slate-600">
                          <div className="flex justify-between"><span>Budget</span><span className="font-medium text-slate-900">{money(b.budget)}</span></div>
                          <div className="flex justify-between"><span>Actual</span><span className="font-medium text-slate-900">{money(b.actual)}</span></div>
                          <div className="flex justify-between"><span>Committed</span><span className="font-medium text-slate-900">{money(b.committed)}</span></div>
                        </div>
                        <div className="mt-4 h-2 overflow-hidden rounded-full bg-slate-200">
                          <div className="h-full rounded-full bg-slate-800" style={{ width: `${pct}%` }}></div>
                        </div>
                      </Card>
                    );
                  })}
                </div>
              )}

              {tab === "schedule" && (
                <Card className="p-6">
                  <SectionTitle title="Near-term schedule" />
                  <div className="mt-4 space-y-3">
                    {scheduleData.map((item) => (
                      <div key={item.task} className="grid gap-3 rounded-2xl border border-slate-200 p-4 md:grid-cols-[2fr_1fr_120px] md:items-center">
                        <div>
                          <div className="font-medium text-slate-900">{item.task}</div>
                          <div className="text-sm text-slate-500">{item.owner}</div>
                        </div>
                        <div className="text-sm text-slate-600">Due {item.due}</div>
                        <div><Badge status>{item.status}</Badge></div>
                      </div>
                    ))}
                  </div>
                </Card>
              )}

              {tab === "decisions" && (
                <div className="grid gap-4 md:grid-cols-2">
                  <Card className="p-6">
                    <SectionTitle title="Open decisions" />
                    <div className="mt-4 space-y-3">
                      {decisionLog.map((d, idx) => (
                        <div key={idx} className="rounded-2xl border border-slate-200 p-4">
                          <div className="mb-2 flex items-center justify-between gap-4">
                            <div>
                              <div className="font-medium text-slate-900">{d.item}</div>
                              <div className="text-sm text-slate-500">{d.area}</div>
                            </div>
                            <Badge status>{d.status}</Badge>
                          </div>
                          <div className="text-sm text-slate-600"><span className="font-medium text-slate-900">Impact:</span> {d.impact}</div>
                          <div className="mt-2 text-sm text-slate-600">{d.note}</div>
                        </div>
                      ))}
                    </div>
                  </Card>

                  <Card className="p-6">
                    <SectionTitle title="Quick add note" />
                    <div className="mt-4 space-y-3">
                      <input placeholder="Area (e.g. Kitchen, Porch, Master Bath)" className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400" />
                      <input placeholder="Decision item" className="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-slate-400" />
                      <textarea placeholder="Write your note, concern, or pending question here..." className="min-h-[180px] w-full rounded-2xl border border-slate-200 p-4 outline-none focus:border-slate-400"></textarea>
                      <div className="flex gap-2">
                        <button className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Save note</button>
                        <button className="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700">Mark as pending</button>
                      </div>
                    </div>
                  </Card>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
